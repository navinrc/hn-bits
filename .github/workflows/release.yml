name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm test
      - run: npm run build

      - run: tar -czf hn-bits-${{ github.ref_name }}.tgz dist package.json

      - uses: softprops/action-gh-release@v2
        with:
          files: hn-bits-*.tgz
          generate_release_notes: true
